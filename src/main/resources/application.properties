quarkus.application.name=remote.agent
quarkus.application.version=1.0.0

quarkus.http.host=192.168.88.2
quarkus.http.port=6001
quarkus.http.cors.origins=192.168.88.2

quarkus.websockets-next.client.traces.enabled=true
quarkus.websockets-next.client.traffic-logging.enabled=true

quarkus.rest-client.account.connect-timeout=5000
quarkus.rest-client.account.scope=ApplicationScoped
quarkus.rest-client.account.logging.body-limit=1024
quarkus.rest-client.account.logging.scope=request-response